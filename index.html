<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,follow" />
    <meta http-equiv="refresh" content="0; url=https://jagged-global-economy.github.io/" />
    <link rel="canonical" href="https://jagged-global-economy.github.io/" />
    <title>Redirecting to The Jagged Global Economy</title>
  </head>
  <body>
    <main>
      <p>
        Redirecting to
        <a href="https://jagged-global-economy.github.io/">The Jagged Global Economy</a>.
      </p>
    </main>
    <script>
      const target = new URL("https://jagged-global-economy.github.io/");
      target.search = window.location.search;
      target.hash = window.location.hash;
      window.location.replace(target.toString());
    </script>
  </body>
</html>
